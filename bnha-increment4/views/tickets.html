<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="../static/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body class="tickets-page"onload="addYear()">
    <div class="container"> 
        <header class="header">
            <img id="logo" src="../static/MonoMuse1.png" alt="MonoMuse Museum Logo"> 
        </header>
        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Buy Tickets</a>
        </nav>
        <main class="main">
            <h3>Buy Tickets</h3>
            <table>
                <tr>
                    <th>Ticket Type</th>
                    <th>Price</th>
                </tr>
                <tr>
                    <td>Adult</td>
                    <td>$15</td>
                </tr>
                <tr>
                    <td>Student/Senior</td>
                    <td>$10</td>
                </tr>
            </table>
            
        </main>
        <figure class="main_figure">
            <h3>Available Dates</h3>
            <table>
                <tr>
                    <th>Date</th>
                    <th>Availability</th>
                </tr>
                <tr>
                    <td>2026-04-01</td>
                    <td>Available</td>
                    <td><button type="button" onclick="showPurchaseForm('2026-04-01')">Buy Now</button></td>
                </tr>
                <tr>
                    <td>2026-04-02</td>
                    <td>Available</td>
                    <td><button type="button" onclick="showPurchaseForm('2026-04-02')">Buy Now</button></td>
                </tr>
                <tr>
                    <td>2026-04-03</td>
                    <td>Sold Out</td>
                </tr>
            </table>
        </figure>
    <div class = "form">
            <form id="purchaseForm">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="tickets">Number of tickets:</label>
                <input type="number" id="tickets" name="tickets" min="1" required>
                <label for="date">Selected date:</label>
                <input type="date" id="date" name="date" required>
                <button type="button" onclick="submitPurchase()">Submit</button>
            </form>
        </div>
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
</body>
</html>
